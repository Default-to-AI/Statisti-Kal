    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!--
      Plausible analytics — cookieless, EU-hosted, privacy-friendly.
      data-domain scoped to statisti-kal.com: previews, localhost, and

      traffic does not pollute production stats. No cookie banner required.
      To switch domains: edit data-domain below; no build plumbing needed.
    -->

    <script type="module" src="/src/main.tsx"></script>
